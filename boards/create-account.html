<!DOCTYPE html>
<html lang="EN">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboards | Create Account</title>
    <link rel="stylesheet" href="../style/dashboard.css" />
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Dashboards</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="../dashboard-index.html">Home</a></li>
                    <li><a href="../dashboard-index.html#about">About</a></li>
                    <li><a href="../dashboard-index.html#pricing-info">Pricing</a></li>
                    <li><a href="../dashboard-index.html#contact-info">Contact</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Join Us</h2>
                <div class="user-profile">Help Center</div>
            </header>

            <section class="card login-card">
                <h2>Create an Account</h2>
                <form action="" method="post">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    
                    <button type="submit">Create Account</button>
                </form>
                <div class="form-links">
                    <p>Already have an account? <a href="../dashboard-index.html">Log-in</a></p>
                </div>
            </section>

            <footer id="contact-info">
                <address>
                    <p><strong>Company Name</strong></p>
                    <p>City, State, Zip Code | Phone Number</p>
                </address>
            </footer>
        </main>
    </div>
    <script src="../script/dashboard.js"></script>
</body>
</html>
